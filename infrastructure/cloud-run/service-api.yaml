apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: nakanaori-api
  annotations:
    run.googleapis.com/ingress: all
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/maxScale: "10"
    spec:
      containerConcurrency: 80
      timeoutSeconds: 300
      containers:
        - image: REGION-docker.pkg.dev/PROJECT_ID/nakanaori/api:latest
          ports:
            - containerPort: 8080
          env:
            - name: PORT
              value: "8080"
            - name: SESSION_STORE
              value: memory
          resources:
            limits:
              cpu: "1"
              memory: 512Mi
