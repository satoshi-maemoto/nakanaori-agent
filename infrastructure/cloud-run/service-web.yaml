apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: nakanaori-web
  annotations:
    run.googleapis.com/ingress: all
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/maxScale: "5"
    spec:
      containers:
        - image: REGION-docker.pkg.dev/PROJECT_ID/nakanaori/web:latest
          ports:
            - containerPort: 8080
          env:
            - name: PORT
              value: "8080"
            - name: VITE_API_BASE_URL
              value: https://nakanaori-api-XXXX.run.app
          resources:
            limits:
              cpu: "1"
              memory: 256Mi
