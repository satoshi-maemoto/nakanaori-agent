name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  agents-and-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prompt forbidden-word check
        run: bash scripts/check-prompts.sh

      - name: Lint and build agents + api
        run: |
          npm run lint --workspace=@nakanaori/agents
          npm run lint --workspace=nakanaori-api
          npm run build --workspace=@nakanaori/agents
          npm run build --workspace=nakanaori-api

      - name: Vitest
        run: npm run test --workspace=@nakanaori/agents

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install and typecheck
        run: |
          npm install
          npm run lint
