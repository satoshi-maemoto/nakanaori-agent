name: Deploy Staging

on:
  push:
    branches: [main]

env:
  REGION: asia-northeast1
  API_SERVICE: nakanaori-api
  WEB_SERVICE: nakanaori-web

jobs:
  deploy-api:
    runs-on: ubuntu-latest
    if: github.repository != ''
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build and push API image
        env:
          PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
        run: |
          IMAGE="${{ env.REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/nakanaori/api:${{ github.sha }}"
          docker build -f services/api/Dockerfile -t "$IMAGE" .
          docker push "$IMAGE"

      - name: Deploy API to Cloud Run
        env:
          PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
        run: |
          IMAGE="${{ env.REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/nakanaori/api:${{ github.sha }}"
          SECRET_ARGS=(--remove-secrets GEMINI_API_KEY)
          if gcloud secrets describe GEMINI_API_KEY --project="$PROJECT_ID" &>/dev/null; then
            ENABLED=$(gcloud secrets versions list GEMINI_API_KEY \
              --project="$PROJECT_ID" \
              --filter="state=ENABLED" \
              --format="value(name)" \
              --limit=1)
            if [[ -n "$ENABLED" ]]; then
              SECRET_ARGS=(--set-secrets "GEMINI_API_KEY=GEMINI_API_KEY:latest")
              echo "GEMINI_API_KEY: mounting enabled secret (LLM mode)"
            else
              echo "::warning::GEMINI_API_KEY has no ENABLED version — deploying in stub mode (LLM off)."
            fi
          else
            echo "::warning::GEMINI_API_KEY not in Secret Manager — deploying in stub mode (LLM off)."
          fi
          gcloud run deploy ${{ env.API_SERVICE }} \
            --image "$IMAGE" \
            --region ${{ env.REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --set-env-vars "SESSION_STORE=memory,LOG_LEVEL=INFO,GIT_SHA=${{ github.sha }}" \
            "${SECRET_ARGS[@]}" \
            --quiet

  deploy-web:
    runs-on: ubuntu-latest
    needs: deploy-api
    if: github.repository != ''
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Resolve API URL
        id: api
        run: |
          API_URL=$(gcloud run services describe ${{ env.API_SERVICE }} \
            --region ${{ env.REGION }} \
            --format 'value(status.url)')
          echo "url=$API_URL" >> "$GITHUB_OUTPUT"

      - name: Download VRM models
        env:
          PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
        run: |
          mkdir -p services/web/public/models
          BUCKET="gs://${PROJECT_ID}-nakanaori-assets/models"
          if gcloud storage ls "${BUCKET}/" >/dev/null 2>&1; then
            gcloud storage cp "${BUCKET}/*.glb" services/web/public/models/
            ls -lh services/web/public/models/
          else
            echo "::warning::VRM bucket not found (${BUCKET}). Run bootstrap-staging-gcp.sh locally after setup-vrm-models."
          fi

      - name: Build and push Web image
        env:
          PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
        run: |
          IMAGE="${{ env.REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/nakanaori/web:${{ github.sha }}"
          docker build -f services/web/Dockerfile \
            --build-arg "VITE_API_BASE_URL=${{ steps.api.outputs.url }}" \
            -t "$IMAGE" \
            services/web
          docker push "$IMAGE"

      - name: Deploy Web to Cloud Run
        env:
          PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
        run: |
          IMAGE="${{ env.REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/nakanaori/web:${{ github.sha }}"
          gcloud run deploy ${{ env.WEB_SERVICE }} \
            --image "$IMAGE" \
            --region ${{ env.REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --port 8080 \
            --quiet

      - name: Resolve service URLs
        id: urls
        run: |
          API_URL=$(gcloud run services describe ${{ env.API_SERVICE }} \
            --region ${{ env.REGION }} \
            --format 'value(status.url)')
          WEB_URL=$(gcloud run services describe ${{ env.WEB_SERVICE }} \
            --region ${{ env.REGION }} \
            --format 'value(status.url)')
          echo "api=$API_URL" >> "$GITHUB_OUTPUT"
          echo "web=$WEB_URL" >> "$GITHUB_OUTPUT"

      - name: Smoke test staging
        run: |
          chmod +x scripts/smoke-staging.sh
          API_URL="${{ steps.urls.outputs.api }}" \
          WEB_URL="${{ steps.urls.outputs.web }}" \
          bash scripts/smoke-staging.sh
