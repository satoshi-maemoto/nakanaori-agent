name: Deploy Staging

on:
  push:
    branches: [main]

env:
  REGION: asia-northeast1
  API_SERVICE: nakanaori-api
  WEB_SERVICE: nakanaori-web

jobs:
  deploy-api:
    runs-on: ubuntu-latest
    if: github.repository != ''
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build and push API image
        env:
          PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
        run: |
          IMAGE="${{ env.REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/nakanaori/api:${{ github.sha }}"
          docker build -f services/api/Dockerfile -t "$IMAGE" .
          docker push "$IMAGE"

      - name: Deploy API to Cloud Run
        env:
          PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
        run: |
          set -euo pipefail
          IMAGE="${{ env.REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/nakanaori/api:${{ github.sha }}"

          mount_optional_secret() {
            local name="$1"
            local ok_label="$2"
            local off_label="$3"
            if gcloud secrets describe "$name" --project="$PROJECT_ID" &>/dev/null; then
              local enabled
              enabled=$(gcloud secrets versions list "$name" \
                --project="$PROJECT_ID" \
                --filter="state=ENABLED" \
                --format="value(name)" \
                --limit=1)
              if [[ -n "$enabled" ]]; then
                SET_SECRETS+=("${name}=${name}:latest")
                echo "${name}: mounting enabled secret (${ok_label})"
              else
                TO_REMOVE+=("$name")
                echo "::warning::${name} has no ENABLED version — ${off_label}"
              fi
            else
              TO_REMOVE+=("$name")
              echo "::warning::${name} not in Secret Manager — ${off_label}"
            fi
          }

          SET_SECRETS=()
          TO_REMOVE=()
          mount_optional_secret GEMINI_API_KEY "LLM mode" "deploying in stub mode (LLM off)"
          mount_optional_secret GOOGLE_TTS_CREDENTIALS_JSON "TTS mode" "deploying without TTS (503 fallback)"

          SECRET_ARGS=()
          if [[ ${#SET_SECRETS[@]} -gt 0 ]]; then
            # --set-secrets replaces the full secret list (cannot combine with --remove-secrets)
            SECRET_ARGS+=(--set-secrets "$(IFS=,; echo "${SET_SECRETS[*]}")")
          elif [[ ${#TO_REMOVE[@]} -gt 0 ]]; then
            SECRET_ARGS+=(--remove-secrets "$(IFS=,; echo "${TO_REMOVE[*]}")")
          fi

          gcloud run deploy ${{ env.API_SERVICE }} \
            --image "$IMAGE" \
            --region ${{ env.REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --set-env-vars "SESSION_STORE=memory,LOG_LEVEL=INFO,GIT_SHA=${{ github.sha }}" \
            "${SECRET_ARGS[@]}" \
            --quiet

  deploy-web:
    runs-on: ubuntu-latest
    needs: deploy-api
    if: github.repository != ''
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Resolve API URL
        id: api
        run: |
          API_URL=$(gcloud run services describe ${{ env.API_SERVICE }} \
            --region ${{ env.REGION }} \
            --format 'value(status.url)')
          echo "url=$API_URL" >> "$GITHUB_OUTPUT"

      - name: Download VRM models
        env:
          PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
        run: |
          mkdir -p services/web/public/models
          BUCKET="gs://${PROJECT_ID}-nakanaori-assets/models"
          if gcloud storage ls "${BUCKET}/" >/dev/null 2>&1; then
            gcloud storage cp "${BUCKET}/*.glb" services/web/public/models/
            ls -lh services/web/public/models/
          else
            echo "::warning::VRM bucket not found (${BUCKET}). Run bootstrap-staging-gcp.sh locally after setup-vrm-models."
          fi

      - name: Build and push Web image
        env:
          PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
        run: |
          IMAGE="${{ env.REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/nakanaori/web:${{ github.sha }}"
          docker build -f services/web/Dockerfile \
            --build-arg "VITE_API_BASE_URL=${{ steps.api.outputs.url }}" \
            -t "$IMAGE" \
            services/web
          docker push "$IMAGE"

      - name: Deploy Web to Cloud Run
        env:
          PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
        run: |
          IMAGE="${{ env.REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/nakanaori/web:${{ github.sha }}"
          gcloud run deploy ${{ env.WEB_SERVICE }} \
            --image "$IMAGE" \
            --region ${{ env.REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --port 8080 \
            --quiet

      - name: Resolve service URLs
        id: urls
        run: |
          API_URL=$(gcloud run services describe ${{ env.API_SERVICE }} \
            --region ${{ env.REGION }} \
            --format 'value(status.url)')
          WEB_URL=$(gcloud run services describe ${{ env.WEB_SERVICE }} \
            --region ${{ env.REGION }} \
            --format 'value(status.url)')
          echo "api=$API_URL" >> "$GITHUB_OUTPUT"
          echo "web=$WEB_URL" >> "$GITHUB_OUTPUT"

      - name: Smoke test staging
        run: |
          chmod +x scripts/smoke-staging.sh
          API_URL="${{ steps.urls.outputs.api }}" \
          WEB_URL="${{ steps.urls.outputs.web }}" \
          bash scripts/smoke-staging.sh
