name: Deploy Staging

on:
  push:
    branches: [main]

env:
  REGION: asia-northeast1
  API_SERVICE: nakanaori-api
  WEB_SERVICE: nakanaori-web

jobs:
  deploy-api:
    runs-on: ubuntu-latest
    if: github.repository != ''
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build and push API image
        env:
          PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
        run: |
          IMAGE="${{ env.REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/nakanaori/api:${{ github.sha }}"
          docker build -f services/api/Dockerfile -t "$IMAGE" .
          docker push "$IMAGE"

      - name: Deploy API to Cloud Run
        env:
          PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
        run: |
          IMAGE="${{ env.REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/nakanaori/api:${{ github.sha }}"
          gcloud run deploy ${{ env.API_SERVICE }} \
            --image "$IMAGE" \
            --region ${{ env.REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --set-env-vars "SESSION_STORE=memory,LOG_LEVEL=INFO" \
            --set-secrets "GEMINI_API_KEY=GEMINI_API_KEY:latest" \
            --quiet

  deploy-web:
    runs-on: ubuntu-latest
    needs: deploy-api
    if: github.repository != ''
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Resolve API URL
        id: api
        run: |
          API_URL=$(gcloud run services describe ${{ env.API_SERVICE }} \
            --region ${{ env.REGION }} \
            --format 'value(status.url)')
          echo "url=$API_URL" >> "$GITHUB_OUTPUT"

      - name: Build and push Web image
        env:
          PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
        run: |
          IMAGE="${{ env.REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/nakanaori/web:${{ github.sha }}"
          docker build -f services/web/Dockerfile \
            --build-arg "VITE_API_BASE_URL=${{ steps.api.outputs.url }}" \
            -t "$IMAGE" \
            services/web
          docker push "$IMAGE"

      - name: Deploy Web to Cloud Run
        env:
          PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
        run: |
          IMAGE="${{ env.REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/nakanaori/web:${{ github.sha }}"
          gcloud run deploy ${{ env.WEB_SERVICE }} \
            --image "$IMAGE" \
            --region ${{ env.REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --port 8080 \
            --quiet
